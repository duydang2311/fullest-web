name: Trigger auto deployment for fullest-web-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/fullest-web-api-AutoDeployTrigger-7a103cdf-46ae-46b2-8816-fe449ab4c377.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.FULLESTWEBAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.FULLESTWEBAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.FULLESTWEBAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: api
          _dockerfilePathKey_: Dockerfile.api
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.FULLESTWEBAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.FULLESTWEBAPI_REGISTRY_PASSWORD }}
          containerAppName: fullest-web-api
          resourceGroup: duyda
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


