name: Trigger auto deployment for fullest-web-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - 'api/**'
    - '.github/workflows/fullest-web-api-AutoDeployTrigger-1fd6611d-c9f0-4f5d-a01d-be12f5e9c2d3.yml'

  # Allow manual trigger 
  workflow_dispatch:
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.FULLESTWEBAPI_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/api
          dockerfilePath: Dockerfile.api
          _targetLabelKey_: _targetLabel_
          registryUrl: fullestweb-fvemcmc3hcavgehe.azurecr.io
          registryUsername: ${{ secrets.FULLESTWEBAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.FULLESTWEBAPI_REGISTRY_PASSWORD }}
          containerAppName: fullest-web-api
          resourceGroup: duyda
          imageToBuild: fullestweb-fvemcmc3hcavgehe.azurecr.io/fullest-web-api:${{ github.sha }}
          
            

     

